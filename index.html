<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Never Gonna Give You Up</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        video {
            max-width: 90%;
            width: 800px;
            border: 2px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .counter {
            margin-top: 20px;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <h1>You've been Rickrolled!</h1>
    <video id="rickrollVideo" controls loop playsinline>
        <source src="rickroll.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="counter">
        Total Rickrolls: <span id="count">Loading...</span>
    </div>
    <script>
        const video = document.getElementById('rickrollVideo');
        const counterContainer = document.getElementById('count');

        // Try to autoplay with sound, fallback to muted
        video.play().catch(() => {
            video.muted = true;
            video.play();
        });

        async function updateCounter() {
            try {
                const response = await fetch('https://api.countapi.xyz/hit/rickroll-page/visits', {
                    method: 'POST'
                });
                const data = await response.json();
                counterContainer.innerText = data.value;
            } catch (error) {
                console.log('Counter error:', error);
                counterContainer.innerText = '∞';
            }
        }

        updateCounter();
    </script>
</body>
</html>
